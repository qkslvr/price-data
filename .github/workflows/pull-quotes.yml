name: pull-quotes

# Fetch one batch of quotes every 5 minutes and store to Neon.
# Note: GitHub's scheduler is best-effort — runs can be delayed a few minutes
# or occasionally skipped under load. That's acceptable for this dashboard.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

# Don't let a slow run overlap with the next scheduled one.
concurrency:
  group: pull-quotes
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: price-quotes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: price-quotes/requirements.txt

      - run: pip install -r requirements.txt

      - name: Fetch quotes -> store -> prune
        run: python -m src.main
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KALQIX_API_KEY: ${{ secrets.KALQIX_API_KEY }}
          KALQIX_API_SECRET: ${{ secrets.KALQIX_API_SECRET }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          UNISWAP_API_KEY: ${{ secrets.UNISWAP_API_KEY }}
          RETENTION_DAYS: "30"
